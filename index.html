<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8mm Records × Discogs Wantlist Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; }
a { color: inherit; }

.app { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }
.header { text-align: center; margin-bottom: 32px; }
.logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #111; }
.logo span { color: #888; font-weight: 400; }
.sub { font-size: 13px; color: #888; margin-top: 4px; }

.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
input[type=text], input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; font-family: inherit; }
input:focus { border-color: #111; }
.help { font-size: 12px; color: #888; margin-top: 4px; }
.help a { color: #111; font-weight: 600; }

.btn-row { margin-top: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.btn { background: #111; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn:hover { background: #333; }
.btn:disabled { background: #999; cursor: not-allowed; }
.btn-sec { background: #fff; color: #111; border: 1px solid #ddd; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-sec:hover { background: #f5f5f5; }

.progress-wrap { flex: 1; min-width: 200px; }
.progress-text { font-size: 12px; color: #666; }
.progress-bar { background: #f0f0f0; border-radius: 4px; height: 6px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; background: #111; border-radius: 4px; transition: width 0.3s ease; width: 0; }

.error { background: #fff5f5; border: 1px solid #fdd; border-radius: 8px; padding: 16px; color: #c00; font-size: 13px; margin-bottom: 16px; }
.stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.stat { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 12px 18px; flex: 1; min-width: 100px; }
.stat-num { font-size: 24px; font-weight: 800; color: #111; }
.stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; flex: 1; min-width: 180px; outline: none; font-family: inherit; }
.search:focus { border-color: #111; }
.fbtn { padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: #fff; color: #333; font-family: inherit; transition: all 0.2s; }
.fbtn:hover { border-color: #999; }
.fbtn.active { background: #111; color: #fff; border-color: #111; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.item { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden; transition: box-shadow 0.2s, transform 0.15s; }
.item:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
.item-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f5f5f5; display: block; }
.item-placeholder { width: 100%; aspect-ratio: 1; background: #f5f5f5; display: flex; align-items: center; justify-content: center; }
.item-body { padding: 12px 14px; }
.item-artist { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-title { font-size: 14px; font-weight: 700; color: #111; margin-top: 2px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.item-meta { font-size: 11px; color: #888; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.item-link { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; color: #111; text-decoration: none; padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; transition: all 0.2s; background: #fff; }
.item-link:hover { background: #111; color: #fff; }
.item-link.sec { color: #666; border-color: #e5e5e5; }
.item-link.sec:hover { background: #f5f5f5; color: #333; }

.empty { text-align: center; padding: 40px; color: #888; }
.howto { text-align: center; color: #666; font-size: 13px; line-height: 1.7; }
.howto strong { color: #333; }
.note { font-size: 12px; color: #999; margin-top: 12px; }
.loaded-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.show-more { text-align: center; padding: 20px; }
.hidden { display: none; }

.vinyl-svg { opacity: 0.15; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">8mm Records <span>&times;</span> Discogs</div>
    <div class="sub">Check which records from your wantlist are available at 8mm Records</div>
  </div>
  <div id="root"></div>
</div>

<template id="tpl-vinyl">
  <svg class="vinyl-svg" width="48" height="48" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" stroke="#999" stroke-width="2" fill="none"/>
    <circle cx="24" cy="24" r="8" stroke="#999" stroke-width="2" fill="none"/>
    <circle cx="24" cy="24" r="2" fill="#999"/>
  </svg>
</template>

<script>
(function() {
  "use strict";

  var STORE = "https://www.8mm-records.com";
  var API = "https://api.discogs.com";
  var PER_PAGE = 50;
  var root = document.getElementById("root");

  var state = {
    items: [], loaded: false, loading: false, error: null,
    progress: null, search: "", format: "all", visCount: PER_PAGE
  };

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  function slugify(t) {
    return (t || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  }

  function storeUrl(id, artist, title) {
    return STORE + "/release/" + id + "/" + slugify(artist + "-" + title);
  }

  function vinylSVG() {
    return '<div class="item-placeholder"><svg class="vinyl-svg" width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" stroke="#999" stroke-width="2" fill="none"/><circle cx="24" cy="24" r="8" stroke="#999" stroke-width="2" fill="none"/><circle cx="24" cy="24" r="2" fill="#999"/></svg></div>';
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  async function fetchWantlist(user, token) {
    state.loading = true;
    state.error = null;
    state.items = [];
    state.loaded = false;
    state.progress = null;
    state.visCount = PER_PAGE;
    state.search = "";
    state.format = "all";
    render();

    var page = 1, all = [], totalPages = 1, total = 0;

    try {
      while (page <= totalPages) {
        var headers = { "User-Agent": "8mmWantlistChecker/1.0" };
        if (token) headers["Authorization"] = "Discogs token=" + token;

        var url = API + "/users/" + encodeURIComponent(user) + "/wants?per_page=100&page=" + page + "&sort=added&sort_order=desc";
        var res = await fetch(url, { headers: headers });

        if (!res.ok) {
          if (res.status === 401) throw new Error("Authentication failed \u2014 check your token.");
          if (res.status === 404) throw new Error("User not found \u2014 check your username.");
          if (res.status === 429) { await sleep(2500); continue; }
          throw new Error("Discogs API error (" + res.status + ")");
        }

        var data = await res.json();
        totalPages = (data.pagination && data.pagination.pages) || 1;
        total = (data.pagination && data.pagination.items) || 0;
        all = all.concat(data.wants || []);

        state.progress = { loaded: all.length, total: total, page: page, totalPages: totalPages };
        render();

        page++;
        if (page <= totalPages) await sleep(1100);
      }

      state.items = all.map(function(w) {
        var b = w.basic_information || {};
        var artists = (b.artists || []).map(function(a) {
          return a.name.replace(/ \(\d+\)$/, "");
        });
        var labels = b.labels || [];
        var formats = (b.formats || []).map(function(f) { return f.name; });
        return {
          id: b.id || w.id,
          artist: artists.join(", ") || "Unknown",
          title: b.title || "",
          label: labels.length > 0 ? labels[0].name || "" : "",
          catno: labels.length > 0 ? labels[0].catno || "" : "",
          format: formats.join(", "),
          year: b.year || "",
          thumb: b.cover_image || b.thumb || ""
        };
      });
      state.loaded = true;
    } catch (e) {
      state.error = e.message;
    }

    state.loading = false;
    state.progress = null;
    render();
  }

  function getFormats() {
    var s = {};
    state.items.forEach(function(it) {
      it.format.split(",").forEach(function(f) {
        f = f.trim();
        if (f) s[f] = true;
      });
    });
    return ["all"].concat(Object.keys(s)).slice(0, 8);
  }

  function getFiltered() {
    var q = state.search.toLowerCase();
    var f = state.format;
    return state.items.filter(function(it) {
      var txt = (it.artist + " " + it.title + " " + it.label + " " + it.catno).toLowerCase();
      var matchSearch = !q || txt.indexOf(q) !== -1;
      var matchFmt = f === "all" || it.format.toLowerCase().indexOf(f.toLowerCase()) !== -1;
      return matchSearch && matchFmt;
    });
  }

  function renderItem(it) {
    var su = storeUrl(it.id, it.artist, it.title);
    var meta = [it.label, it.year, it.format].filter(Boolean).join(" \u00b7 ");
    var imgHtml = it.thumb
      ? '<img class="item-img" src="' + esc(it.thumb) + '" alt="" loading="lazy" onerror="this.outerHTML=\'' + vinylSVG().replace(/'/g, "\\'") + '\'">'
      : vinylSVG();

    return '<div class="item">' + imgHtml +
      '<div class="item-body">' +
      '<div class="item-artist">' + esc(it.artist) + '</div>' +
      '<div class="item-title">' + esc(it.title) + '</div>' +
      (meta ? '<div class="item-meta">' + esc(meta) + '</div>' : '') +
      '<div class="item-links">' +
      (it.id ? '<a class="item-link" href="' + esc(su) + '" target="_blank" rel="noopener">Check on 8mm \u2192</a>' : '') +
      (it.id ? '<a class="item-link sec" href="https://www.discogs.com/release/' + it.id + '" target="_blank" rel="noopener">Discogs</a>' : '') +
      '</div></div></div>';
  }

  function render() {
    // --- LOGIN ---
    if (!state.loaded && !state.loading) {
      var errHtml = state.error
        ? '<div class="error">' + esc(state.error) + '</div>'
        : '';

      root.innerHTML = errHtml +
        '<div class="card">' +
          '<div class="form-row">' +
            '<div><label>Discogs Username</label><input type="text" id="inp-user" placeholder="your_username"></div>' +
            '<div><label>Personal Access Token</label><input type="password" id="inp-token" placeholder="paste your token here">' +
            '<div class="help">Get one at <a href="https://www.discogs.com/settings/developers" target="_blank">discogs.com/settings/developers</a></div></div>' +
          '</div>' +
          '<div class="btn-row"><button class="btn" id="btn-go">Fetch My Wantlist</button></div>' +
        '</div>' +
        '<div class="card howto">' +
          '<strong>How it works</strong><br>' +
          '1. Enter your Discogs username and token above<br>' +
          '2. We fetch your wantlist from the Discogs API<br>' +
          '3. Each item gets a direct link to check availability on <a href="https://www.8mm-records.com" target="_blank" style="font-weight:600">8mm Records</a>' +
          '<div class="note">Your token is only used in-browser to call Discogs directly. Nothing is stored on any server.</div>' +
        '</div>';

      var btnGo = document.getElementById("btn-go");
      var inpUser = document.getElementById("inp-user");
      var inpToken = document.getElementById("inp-token");

      btnGo.addEventListener("click", function() {
        var u = inpUser.value.trim();
        var t = inpToken.value.trim();
        if (u) fetchWantlist(u, t);
      });
      inpUser.addEventListener("keydown", function(e) { if (e.key === "Enter") btnGo.click(); });
      inpToken.addEventListener("keydown", function(e) { if (e.key === "Enter") btnGo.click(); });
      return;
    }

    // --- LOADING ---
    if (state.loading) {
      var p = state.progress;
      var pHtml = p
        ? '<div class="progress-text">Loaded ' + p.loaded + ' of ' + p.total + ' items (page ' + p.page + '/' + p.totalPages + ')</div>' +
          '<div class="progress-bar" style="max-width:300px;margin:8px auto 0"><div class="progress-fill" style="width:' + (p.loaded / Math.max(p.total, 1) * 100) + '%"></div></div>'
        : '<div class="progress-text">Connecting to Discogs...</div>';

      root.innerHTML =
        '<div class="card" style="text-align:center;padding:40px">' +
          '<div style="font-size:16px;font-weight:700;margin-bottom:12px">Fetching your wantlist\u2026</div>' +
          pHtml +
        '</div>';
      return;
    }

    // --- EMPTY ---
    if (state.loaded && state.items.length === 0) {
      root.innerHTML =
        '<div class="card empty">' +
          '<div style="font-size:18px;font-weight:700;margin-bottom:8px">Wantlist is empty</div>' +
          '<div>No items found, or the wantlist is set to private.</div>' +
          '<button class="btn-sec" style="margin-top:16px" id="btn-back">\u2190 Back</button>' +
        '</div>';
      document.getElementById("btn-back").addEventListener("click", function() {
        state.loaded = false; render();
      });
      return;
    }

    // --- RESULTS ---
    var filtered = getFiltered();
    var formats = getFormats();
    var shown = filtered.slice(0, state.visCount);
    var hasMore = shown.length < filtered.length;
    var artistSet = {};
    state.items.forEach(function(i) { artistSet[i.artist] = true; });
    var artistCount = Object.keys(artistSet).length;

    var html = '';

    html += '<div class="loaded-bar">' +
      '<div style="font-size:13px;color:#666">Loaded <strong>' + state.items.length + '</strong> wantlist items</div>' +
      '<button class="btn-sec" id="btn-reset">New search</button></div>';

    html += '<div class="stats">' +
      '<div class="stat"><div class="stat-num">' + state.items.length + '</div><div class="stat-label">Wantlist</div></div>' +
      '<div class="stat"><div class="stat-num">' + filtered.length + '</div><div class="stat-label">Shown</div></div>' +
      '<div class="stat"><div class="stat-num">' + artistCount + '</div><div class="stat-label">Artists</div></div>' +
      '</div>';

    html += '<div class="filters">' +
      '<input class="search" id="inp-search" placeholder="Search artist, title, label\u2026" value="' + esc(state.search) + '">';
    formats.forEach(function(f) {
      var cls = "fbtn" + (state.format === f ? " active" : "");
      html += '<button class="' + cls + '" data-f="' + esc(f) + '">' + (f === "all" ? "All" : esc(f)) + '</button>';
    });
    html += '</div>';

    html += '<div class="grid">';
    shown.forEach(function(it) { html += renderItem(it); });
    html += '</div>';

    if (hasMore) {
      html += '<div class="show-more"><button class="btn-sec" id="btn-more">Show more (' + (filtered.length - shown.length) + ' remaining)</button></div>';
    }
    if (filtered.length === 0) {
      html += '<div class="empty">No items match your filters.</div>';
    }

    root.innerHTML = html;

    // Bind events
    document.getElementById("btn-reset").addEventListener("click", function() {
      state.loaded = false; state.items = []; state.error = null;
      state.search = ""; state.format = "all"; state.visCount = PER_PAGE;
      render();
    });

    var inpSearch = document.getElementById("inp-search");
    if (inpSearch) {
      inpSearch.addEventListener("input", function(e) {
        state.search = e.target.value;
        state.visCount = PER_PAGE;
        render();
        var el = document.getElementById("inp-search");
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      });
    }

    var fbtns = document.querySelectorAll(".fbtn");
    fbtns.forEach(function(b) {
      b.addEventListener("click", function() {
        state.format = b.getAttribute("data-f");
        state.visCount = PER_PAGE;
        render();
      });
    });

    var btnMore = document.getElementById("btn-more");
    if (btnMore) {
      btnMore.addEventListener("click", function() {
        state.visCount += PER_PAGE;
        render();
      });
    }
  }

  render();
})();
</script>
</body>
</html>
