<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8mm Records &times; Discogs Wantlist Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh}
a{color:inherit}
.app{max-width:960px;margin:0 auto;padding:24px 16px 60px}

/* Header */
.header{text-align:center;margin-bottom:32px}
.logo{font-size:28px;font-weight:800;letter-spacing:-.5px;color:#111}
.logo span{color:#888;font-weight:400}
.sub{font-size:13px;color:#888;margin-top:4px}

/* Card */
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:24px;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
.inp{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .2s;font-family:inherit;background:#fff;color:#1a1a1a}
.inp:focus{border-color:#111}
.help{font-size:12px;color:#888;margin-top:4px}
.help a{color:#111;font-weight:600}

/* Buttons */
.btn{background:#111;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover{background:#333}
.btn:disabled{background:#999;cursor:not-allowed}
.btn-sec{background:#fff;color:#111;border:1px solid #ddd;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sec:hover{background:#f5f5f5}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-green{background:#0a7d4f;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-green:hover{background:#096b43}
.btn-green:disabled{background:#93c9ae;cursor:not-allowed}
.btn-row{margin-top:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* Progress */
.progress-text{font-size:12px;color:#666}
.pbar{background:#f0f0f0;border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:4px;transition:width .3s ease}
.pfill-dark{background:#111}
.pfill-green{background:#0a7d4f}

/* Error */
.error{background:#fff5f5;border:1px solid #fdd;border-radius:8px;padding:16px;color:#c00;font-size:13px;margin-bottom:16px}

/* Stats */
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #eee;border-radius:8px;padding:12px 18px;flex:1;min-width:80px}
.stat-n{font-size:22px;font-weight:800;color:#111}
.stat-n.green{color:#0a7d4f}
.stat-l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;flex:1;min-width:140px;outline:none;font-family:inherit}
.search:focus{border-color:#111}
.fbtn{padding:5px 12px;font-size:12px;font-weight:600;border-radius:6px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#333;font-family:inherit;transition:all .15s}
.fbtn:hover{border-color:#999}
.fbtn.on{background:#111;color:#fff;border-color:#111}
.vtog{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-left:auto;flex-shrink:0}
.vb{padding:6px 10px;border:none;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vb+.vb{border-left:1px solid #ddd}
.vb.on{background:#111}
.vb.on svg *{stroke:#fff}
.vb svg{width:16px;height:16px;stroke:#666;stroke-width:2;fill:none}

/* Check bar */
.check-bar{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.check-bar .pw{flex:1;min-width:200px}

/* GRID VIEW */
.v-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.v-grid .it{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column}
.v-grid .it:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.v-grid .it-iw{width:100%;padding-top:100%;position:relative;overflow:hidden;background:#f5f5f5;flex-shrink:0}
.v-grid .it-iw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.v-grid .it-iw .ph{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.v-grid .it-bd{padding:10px 12px;flex:1;display:flex;flex-direction:column}
.v-grid .it-ar{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-grid .it-ti{font-size:13px;font-weight:700;color:#111;margin-top:1px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.v-grid .it-me{font-size:10px;color:#888;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* LIST VIEW */
.v-list .it{background:#fff;border:1px solid #e8e8e8;border-radius:8px;display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:8px;transition:box-shadow .2s}
.v-list .it:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.v-list .it-iw{width:52px;height:52px;flex-shrink:0;border-radius:6px;overflow:hidden;background:#f5f5f5;position:relative}
.v-list .it-iw img{width:100%;height:100%;object-fit:cover}
.v-list .it-iw .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.v-list .it-bd{flex:1;min-width:0}
.v-list .it-ar{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-list .it-ti{font-size:13px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-list .it-me{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-list .it-act{flex-shrink:0;display:flex;align-items:center;gap:6px}

/* COMPACT GRID */
.v-compact{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.v-compact .it{background:#fff;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;transition:box-shadow .2s,transform .15s}
.v-compact .it:hover{box-shadow:0 3px 14px rgba(0,0,0,.07);transform:translateY(-1px)}
.v-compact .it-iw{width:100%;padding-top:100%;position:relative;overflow:hidden;background:#f5f5f5}
.v-compact .it-iw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.v-compact .it-iw .ph{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.v-compact .it-bd{padding:7px 9px}
.v-compact .it-ar{font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-compact .it-ti{font-size:11px;font-weight:700;color:#111;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-compact .it-me{display:none}

/* Badges & Links */
.it-lnk{display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#111;text-decoration:none;padding:4px 10px;border:1px solid #ddd;border-radius:5px;transition:all .15s;background:#fff;white-space:nowrap}
.it-lnk:hover{background:#111;color:#fff}
.it-lnk.sec{color:#888;border-color:#eee}
.it-lnk.sec:hover{background:#f5f5f5;color:#333}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge.found{background:#e6f7ee;color:#0a7d4f}
.badge.found a{color:#0a7d4f;text-decoration:underline;text-underline-offset:2px}
.badge.notfound{background:#f5f5f5;color:#999}
.badge.err{background:#fff8e6;color:#a68600}
.badge.err a{color:#a68600;text-decoration:underline;text-underline-offset:2px}
.badge.pending{background:#f0f4ff;color:#5577bb}
.it-st{margin-top:5px}
.it-lks{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}

.empty{text-align:center;padding:40px;color:#888}
.howto{text-align:center;color:#666;font-size:13px;line-height:1.7}
.howto strong{color:#333}
.note{font-size:12px;color:#999;margin-top:12px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.more{text-align:center;padding:20px}
.vinyl{opacity:.15}

@media(max-width:600px){
  .v-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .v-compact{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .v-list .it{flex-wrap:wrap}
  .check-bar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">8mm Records <span>&times;</span> Discogs</div>
    <div class="sub">Check which records from your wantlist are available at 8mm Records</div>
  </div>
  <div id="root"></div>
</div>
<script>
(function(){
"use strict";
var STORE="https://www.8mm-records.com",API="https://api.discogs.com",PER_PAGE=60,root=document.getElementById("root");

/* --- State --- */
var S={items:[],loaded:false,loading:false,error:null,progress:null,
  search:"",format:"all",vis:PER_PAGE,view:"grid",
  cs:{},checking:false,cprog:null,cabort:false,onlyFound:false,
  user:"",token:""};

/* --- Persist credentials --- */
try{S.user=sessionStorage.getItem("dg_u")||"";S.token=sessionStorage.getItem("dg_t")||""}catch(e){}
function saveCredentials(){try{sessionStorage.setItem("dg_u",S.user);sessionStorage.setItem("dg_t",S.token)}catch(e){}}

/* --- Helpers --- */
function h(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function slug(t){return(t||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")}
function surl(id,a,t){return STORE+"/release/"+id+"/"+slug(a+"-"+t)}
function wait(ms){return new Promise(function(r){setTimeout(r,ms)})}
function $(id){return document.getElementById(id)}
function svg(sz){sz=sz||36;return '<svg class="vinyl" width="'+sz+'" height="'+sz+'" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" stroke="#aaa" stroke-width="1.5" fill="none"/><circle cx="24" cy="24" r="8" stroke="#aaa" stroke-width="1.5" fill="none"/><circle cx="24" cy="24" r="2" fill="#bbb"/></svg>'}

/* --- Discogs fetch --- */
async function fetchWL(){
  S.loading=true;S.error=null;S.items=[];S.loaded=false;S.progress=null;S.vis=PER_PAGE;
  S.search="";S.format="all";S.cs={};S.checking=false;S.cprog=null;S.onlyFound=false;
  render();
  var pg=1,all=[],tp=1,tot=0;
  try{
    while(pg<=tp){
      var hd={"User-Agent":"8mmWLCheck/1.0"};
      if(S.token)hd["Authorization"]="Discogs token="+S.token;
      var url=API+"/users/"+encodeURIComponent(S.user)+"/wants?per_page=100&page="+pg+"&sort=added&sort_order=desc";
      var r=await fetch(url,{headers:hd});
      if(!r.ok){
        if(r.status===401)throw new Error("Authentication failed \u2014 check your token.");
        if(r.status===404)throw new Error("User not found \u2014 check your username.");
        if(r.status===429){await wait(2500);continue}
        throw new Error("Discogs error ("+r.status+")")
      }
      var d=await r.json();
      tp=d.pagination&&d.pagination.pages||1;
      tot=d.pagination&&d.pagination.items||0;
      all=all.concat(d.wants||[]);
      S.progress={ld:all.length,tot:tot,pg:pg,tp:tp};render();
      pg++;if(pg<=tp)await wait(1100)
    }
    S.items=all.map(function(w){
      var b=w.basic_information||{};
      return{
        id:String(b.id||w.id||""),
        master:String(b.master_id||""),
        artist:(b.artists||[]).map(function(a){return a.name.replace(/ \(\d+\)$/,"")}).join(", ")||"Unknown",
        title:b.title||"",
        label:(b.labels||[])[0]?b.labels[0].name:"",
        catno:(b.labels||[])[0]?b.labels[0].catno:"",
        format:(b.formats||[]).map(function(f){return f.name}).join(", "),
        year:b.year||"",
        thumb:b.cover_image||b.thumb||""
      }
    });
    S.loaded=true
  }catch(e){S.error=e.message}
  S.loading=false;S.progress=null;render()
}

/* --- 8mm check ---
   8mm uses Common Ground (SPA). The server renders the <title> tag with
   the actual release name when the item exists. But cross-origin fetches
   are blocked by CORS. We use a public CORS proxy to get the HTML and
   then parse the <title> to detect whether the release exists.
*/
var PROXY="https://corsproxy.io/?url=";

async function checkOne(it){
  var url=surl(it.id,it.artist,it.title);
  var encoded=PROXY+encodeURIComponent(url);

  /* Try proxy fetch */
  try{
    var r=await fetch(encoded,{method:"GET"});
    if(r.ok){
      var txt=await r.text();
      var tm=txt.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
      var pt=tm?tm[1].trim():"";
      /* A real release page: title is "Artist - Title | Label (Catno)" — long and specific.
         A missing page returns "8mm Records" or "8mm-records" or similar short default. */
      if(pt&&pt.length>20&&pt.toLowerCase().indexOf("8mm records")!==0&&pt.toLowerCase().indexOf("8mm-records")!==0){
        return "found"
      }
      return "no"
    }
    return "no"
  }catch(e){}

  /* Fallback: try direct fetch (in case store has CORS) */
  try{
    var r2=await fetch(url,{method:"GET",redirect:"follow"});
    if(r2.ok){
      var txt2=await r2.text();
      var tm2=txt2.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
      var pt2=tm2?tm2[1].trim():"";
      if(pt2&&pt2.length>20&&pt2.toLowerCase().indexOf("8mm records")!==0&&pt2.toLowerCase().indexOf("8mm-records")!==0){
        return "found"
      }
      return "no"
    }
  }catch(e2){}

  return "err"
}

async function checkAll(){
  S.checking=true;S.cabort=false;
  var items=S.items,tot=items.length,done=0;
  S.cprog={done:0,tot:tot,found:0};render();

  for(var i=0;i<items.length;i++){
    if(S.cabort)break;
    var it=items[i];
    if(S.cs[it.id]){done++;continue}

    S.cs[it.id]=await checkOne(it);

    done++;
    var fc=0;Object.keys(S.cs).forEach(function(k){if(S.cs[k]==="found")fc++});
    S.cprog={done:done,tot:tot,found:fc};
    if(done%2===0||i===items.length-1)render();
    await wait(500)
  }
  S.checking=false;render()
}

/* --- Filter helpers --- */
function fmts(){
  var s={};S.items.forEach(function(it){it.format.split(",").forEach(function(f){f=f.trim();if(f)s[f]=true})});
  return["all"].concat(Object.keys(s)).slice(0,7)
}
function filtered(){
  var q=S.search.toLowerCase(),f=S.format;
  return S.items.filter(function(it){
    var t=(it.artist+" "+it.title+" "+it.label+" "+it.catno).toLowerCase();
    return(!q||t.indexOf(q)!==-1)&&(f==="all"||it.format.toLowerCase().indexOf(f.toLowerCase())!==-1)&&(!S.onlyFound||S.cs[it.id]==="found")
  })
}

/* --- Render helpers --- */
var ICON_GRID='<svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>';
var ICON_COMPACT='<svg viewBox="0 0 16 16"><rect x="1" y="1" width="4" height="4" rx=".5"/><rect x="6" y="1" width="4" height="4" rx=".5"/><rect x="11" y="1" width="4" height="4" rx=".5"/><rect x="1" y="6" width="4" height="4" rx=".5"/><rect x="6" y="6" width="4" height="4" rx=".5"/><rect x="11" y="6" width="4" height="4" rx=".5"/><rect x="1" y="11" width="4" height="4" rx=".5"/><rect x="6" y="11" width="4" height="4" rx=".5"/><rect x="11" y="11" width="4" height="4" rx=".5"/></svg>';
var ICON_LIST='<svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="3" rx="1"/><rect x="1" y="7" width="14" height="3" rx="1"/><rect x="1" y="12" width="14" height="3" rx="1"/></svg>';

function imgTag(src,sz){
  if(!src)return '<div class="ph">'+svg(sz||36)+'</div>';
  var uid="img"+Math.random().toString(36).substr(2,6);
  return '<img id="'+uid+'" src="'+h(src)+'" alt="" loading="lazy" data-sz="'+(sz||36)+'">'
}

function statusHTML(it){
  var st=S.cs[it.id],su=surl(it.id,it.artist,it.title);
  if(!st)return'';
  if(st==="found")return '<div class="it-st"><span class="badge found">\u2713 <a href="'+h(su)+'" target="_blank">Available at 8mm</a></span></div>';
  if(st==="err")return '<div class="it-st"><span class="badge err">\u26A0 <a href="'+h(su)+'" target="_blank">Check manually</a></span></div>';
  return '<div class="it-st"><span class="badge notfound">\u2014 Not in store</span></div>'
}

function linksHTML(it){
  var su=surl(it.id,it.artist,it.title),st=S.cs[it.id];
  var o='<div class="it-lks">';
  if(!st)o+='<a class="it-lnk" href="'+h(su)+'" target="_blank">8mm \u2192</a>';
  o+='<a class="it-lnk sec" href="https://www.discogs.com/release/'+h(it.id)+'" target="_blank">Discogs</a>';
  return o+'</div>'
}

function renderItem(it){
  var meta=[it.label,it.year,it.format].filter(Boolean).join(" \u00b7 ");
  var v=S.view;
  if(v==="list"){
    return '<div class="it">'+
      '<div class="it-iw">'+imgTag(it.thumb,24)+'</div>'+
      '<div class="it-bd"><div class="it-ar">'+h(it.artist)+'</div><div class="it-ti">'+h(it.title)+'</div>'+
      '<div class="it-me">'+h(meta)+'</div></div>'+
      '<div class="it-act">'+statusHTML(it)+linksHTML(it)+'</div></div>'
  }
  return '<div class="it">'+
    '<div class="it-iw">'+imgTag(it.thumb, v==="compact"?28:36)+'</div>'+
    '<div class="it-bd"><div class="it-ar">'+h(it.artist)+'</div><div class="it-ti">'+h(it.title)+'</div>'+
    '<div class="it-me">'+h(meta)+'</div>'+statusHTML(it)+linksHTML(it)+'</div></div>'
}

/* --- Handle broken images after render --- */
function fixImages(){
  document.querySelectorAll(".it-iw img").forEach(function(img){
    if(img.complete&&img.naturalWidth===0)replaceBroken(img);
    else img.addEventListener("error",function(){replaceBroken(img)})
  })
}
function replaceBroken(img){
  var sz=parseInt(img.getAttribute("data-sz"))||36;
  var d=document.createElement("div");d.className="ph";d.innerHTML=svg(sz);
  img.parentNode.replaceChild(d,img)
}

/* --- Main render --- */
function render(){
  /* LOGIN */
  if(!S.loaded&&!S.loading){
    var er=S.error?'<div class="error">'+h(S.error)+'</div>':'';
    root.innerHTML=er+
      '<div class="card"><div class="form-row">'+
        '<div><label for="iu">Discogs Username</label>'+
        '<input class="inp" type="text" id="iu" placeholder="your_username" value="'+h(S.user)+'" autocomplete="off" data-1p-ignore data-lpignore="true"></div>'+
        '<div><label for="it">Personal Access Token</label>'+
        '<input class="inp" type="text" id="it" placeholder="paste your token here" value="'+h(S.token)+'" autocomplete="off" data-1p-ignore data-lpignore="true" style="-webkit-text-security:disc">'+
        '<div class="help">Get one at <a href="https://www.discogs.com/settings/developers" target="_blank">discogs.com/settings/developers</a></div></div>'+
      '</div><div class="btn-row"><button class="btn" id="bgo">Fetch My Wantlist</button></div></div>'+
      '<div class="card howto"><strong>How it works</strong><br>'+
        '1. Enter your Discogs username and token<br>'+
        '2. We fetch your wantlist from the Discogs API<br>'+
        '3. Click \u201CCheck all on 8mm\u201D to scan their catalog<br>'+
        '4. Found items link directly to the <a href="https://www.8mm-records.com" target="_blank" style="font-weight:600">8mm Records</a> product page'+
        '<div class="note">Everything runs in your browser. Nothing leaves this page.</div></div>';
    $("bgo").addEventListener("click",function(){
      S.user=$("iu").value.trim();S.token=$("it").value.trim();
      saveCredentials();
      if(S.user)fetchWL()
    });
    $("iu").addEventListener("keydown",function(e){if(e.key==="Enter")$("bgo").click()});
    $("it").addEventListener("keydown",function(e){if(e.key==="Enter")$("bgo").click()});
    return
  }

  /* LOADING */
  if(S.loading){
    var p=S.progress;
    var ph=p?'<div class="progress-text">Loaded '+p.ld+' of '+p.tot+' items (page '+p.pg+'/'+p.tp+')</div>'+
      '<div class="pbar" style="max-width:300px;margin:8px auto 0"><div class="pfill pfill-dark" style="width:'+(p.ld/Math.max(p.tot,1)*100)+'%"></div></div>'
      :'<div class="progress-text">Connecting to Discogs\u2026</div>';
    root.innerHTML='<div class="card" style="text-align:center;padding:40px"><div style="font-size:16px;font-weight:700;margin-bottom:12px">Fetching your wantlist\u2026</div>'+ph+'</div>';
    return
  }

  /* EMPTY */
  if(S.loaded&&S.items.length===0){
    root.innerHTML='<div class="card empty"><div style="font-size:18px;font-weight:700;margin-bottom:8px">Wantlist is empty</div>'+
      '<div>No items found, or the wantlist is set to private.</div>'+
      '<button class="btn-sec" style="margin-top:16px" id="bb">\u2190 Back</button></div>';
    $("bb").addEventListener("click",function(){S.loaded=false;render()});
    return
  }

  /* RESULTS */
  var fl=filtered(),fm=fmts(),sh=fl.slice(0,S.vis),more=sh.length<fl.length;
  var artc={},fc=0;
  S.items.forEach(function(i){artc[i.artist]=true});
  Object.keys(S.cs).forEach(function(k){if(S.cs[k]==="found")fc++});
  var hc=Object.keys(S.cs).length>0;

  var o='';

  /* Top bar */
  o+='<div class="top-bar"><div style="font-size:13px;color:#666">Loaded <strong>'+S.items.length+'</strong> items for <strong>'+h(S.user)+'</strong></div>'+
    '<div style="display:flex;gap:8px"><button class="btn-sec btn-sm" id="brl">\u21BB Refresh</button>'+
    '<button class="btn-sec btn-sm" id="brs">Logout</button></div></div>';

  /* Stats */
  o+='<div class="stats">'+
    '<div class="stat"><div class="stat-n">'+S.items.length+'</div><div class="stat-l">Wantlist</div></div>'+
    '<div class="stat"><div class="stat-n">'+Object.keys(artc).length+'</div><div class="stat-l">Artists</div></div>';
  if(hc)o+='<div class="stat"><div class="stat-n green">'+fc+'</div><div class="stat-l">Found at 8mm</div></div>';
  o+='</div>';

  /* Check bar */
  o+='<div class="check-bar">';
  if(!S.checking){
    o+='<button class="btn-green" id="bch">'+(hc?'\u21BB Re-check on 8mm':'\u2713 Check all on 8mm')+'</button>';
    if(hc&&fc>0)o+='<button class="fbtn'+(S.onlyFound?' on':'')+'" id="btf">Only available ('+fc+')</button>'
  }else{
    var cp=S.cprog||{done:0,tot:S.items.length,found:0};
    o+='<button class="btn-sec btn-sm" id="bst">\u25A0 Stop</button>'+
      '<div class="pw"><div class="progress-text">Checking\u2026 '+cp.done+'/'+cp.tot+' ('+cp.found+' found)</div>'+
      '<div class="pbar"><div class="pfill pfill-green" style="width:'+(cp.done/Math.max(cp.tot,1)*100)+'%"></div></div></div>'
  }
  o+='</div>';

  /* Toolbar */
  o+='<div class="toolbar">'+
    '<input class="search" id="isrch" placeholder="Search artist, title, label\u2026" value="'+h(S.search)+'" autocomplete="off" data-1p-ignore data-lpignore="true">';
  fm.forEach(function(f){o+='<button class="fbtn'+(S.format===f?' on':'')+'" data-f="'+h(f)+'">'+(f==="all"?"All":h(f))+'</button>'});
  o+='<div class="vtog">'+
    '<button class="vb'+(S.view==="grid"?' on':'')+'" data-v="grid" title="Grid">'+ICON_GRID+'</button>'+
    '<button class="vb'+(S.view==="compact"?' on':'')+'" data-v="compact" title="Compact">'+ICON_COMPACT+'</button>'+
    '<button class="vb'+(S.view==="list"?' on':'')+'" data-v="list" title="List">'+ICON_LIST+'</button>'+
    '</div></div>';

  /* Items */
  o+='<div class="v-'+S.view+'">';
  sh.forEach(function(it){o+=renderItem(it)});
  o+='</div>';

  if(more)o+='<div class="more"><button class="btn-sec" id="bmo">Show more ('+(fl.length-sh.length)+' remaining)</button></div>';
  if(fl.length===0)o+='<div class="empty">No items match your filters.</div>';

  root.innerHTML=o;
  fixImages();

  /* Bind */
  $("brs").addEventListener("click",function(){
    S.loaded=false;S.items=[];S.error=null;S.search="";S.format="all";S.vis=PER_PAGE;
    S.cs={};S.checking=false;S.onlyFound=false;render()
  });
  $("brl").addEventListener("click",function(){
    if(S.user)fetchWL()
  });
  var isrch=$("isrch");
  if(isrch){
    isrch.addEventListener("input",function(e){S.search=e.target.value;S.vis=PER_PAGE;render();
      var el=$("isrch");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}
    })
  }
  document.querySelectorAll("[data-f]").forEach(function(b){
    b.addEventListener("click",function(){S.format=b.getAttribute("data-f");S.vis=PER_PAGE;render()})
  });
  document.querySelectorAll("[data-v]").forEach(function(b){
    b.addEventListener("click",function(){S.view=b.getAttribute("data-v");render()})
  });
  var bmo=$("bmo");if(bmo)bmo.addEventListener("click",function(){S.vis+=PER_PAGE;render()});
  var bch=$("bch");if(bch)bch.addEventListener("click",function(){S.cs={};checkAll()});
  var bst=$("bst");if(bst)bst.addEventListener("click",function(){S.cabort=true});
  var btf=$("btf");if(btf)btf.addEventListener("click",function(){S.onlyFound=!S.onlyFound;S.vis=PER_PAGE;render()})
}

render()
})();
</script>
</body>
</html>
